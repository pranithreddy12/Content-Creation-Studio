name: CI

# Trigger on the real default branch (master) — both direct pushes and PRs
# targeting it. (Previously [main, develop], which never matched, so CI never ran.)
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      # Mirror docker-compose.yml's non-default host ports.
      postgres:
        image: pgvector/pgvector:pg16   # NOT plain postgres — the schema needs the `vector` extension
        env: { POSTGRES_PASSWORD: studio, POSTGRES_USER: studio, POSTGRES_DB: studio_test }
        ports: ["5435:5432"]
        options: >-
          --health-cmd "pg_isready -U studio"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6381:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.11.0
        ports: ["6333:6333"]
      minio:
        # bitnami/minio starts the server by default (the plain minio image needs a
        # `server /data` arg that GH service containers can't supply) and
        # MINIO_DEFAULT_BUCKETS auto-creates the bucket the tests expect.
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin123
          MINIO_DEFAULT_BUCKETS: studio-media
        ports: ["9000:9000"]
    env:
      DATABASE_URL: postgresql+asyncpg://studio:studio@localhost:5435/studio_test
      REDIS_URL: redis://localhost:6381/0
      QDRANT_URL: http://localhost:6333
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET: studio-media
      S3_REGION: us-east-1
      SECRET_KEY: testtesttesttesttesttesttesttesttest
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r backend/requirements.txt
      - run: pip install ruff pytest pytest-asyncio
      - name: Lint (ruff)
        run: ruff check backend/app
      - name: Wait for qdrant + minio
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz && curl -sf http://localhost:9000/minio/health/live; then
              echo "services ready"; exit 0
            fi
            sleep 2
          done
          echo "services did not become ready"; exit 1
      - name: Ensure MinIO bucket
        # bitnami's MINIO_DEFAULT_BUCKETS usually creates the bucket, but its
        # /minio/health/live can return 200 before that finishes — and the S3
        # tests put_object directly (fail, not skip, on a missing bucket). Create
        # it idempotently here so the bucket is guaranteed before tests, with zero
        # dependence on the image's startup timing.
        run: |
          python - <<'PY'
          import boto3, botocore
          s3 = boto3.client("s3", endpoint_url="http://localhost:9000",
                            region_name="us-east-1",
                            aws_access_key_id="minioadmin",
                            aws_secret_access_key="minioadmin123")
          try:
              s3.create_bucket(Bucket="studio-media")
              print("bucket created")
          except botocore.exceptions.ClientError as e:
              code = e.response["Error"]["Code"]
              if code in ("BucketAlreadyOwnedByYou", "BucketAlreadyExists"):
                  print("bucket already exists")
              else:
                  raise
          PY
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Tests
        working-directory: backend
        run: pytest -q tests
      - name: Migration drift check
        working-directory: backend
        # Fails the build if models and migrations have diverged. NOTE: because the
        # 0001 baseline is `Base.metadata.create_all`, a freshly-upgraded DB matches
        # the models by construction, so this currently reports 0 drift. Its value is
        # as a guardrail for FUTURE explicit migrations (e.g. 0002+) — once the
        # baseline is frozen into create_table ops, real drift will surface here.
        run: alembic check

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm test
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm i --legacy-peer-deps
        working-directory: mobile
      - run: npx tsc --noEmit
        working-directory: mobile

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with: { scan-type: fs, severity: HIGH,CRITICAL, exit-code: "1", ignore-unfixed: "true" }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
