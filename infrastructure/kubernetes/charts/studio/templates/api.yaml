apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: {{- include "studio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: "{{ .Values.global.image.registry }}/api:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports: [{ containerPort: 8000, name: http }]
          envFrom:
            - configMapRef: { name: studio-config }
            - secretRef:    { name: studio-secrets }
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          readinessProbe: { httpGet: { path: /health, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 15, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata: { name: api }
spec:
  selector: { app: api }
  ports: [{ port: 80, targetPort: 8000 }]
{{- if .Values.api.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: {{ .Values.api.hpa.min }}
  maxReplicas: {{ .Values.api.hpa.max }}
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: {{ .Values.api.hpa.targetCPU }} } }
{{- end }}
