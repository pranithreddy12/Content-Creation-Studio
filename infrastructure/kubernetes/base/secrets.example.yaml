# Example secret manifest — apply via External Secrets Operator in prod.
apiVersion: v1
kind: Secret
metadata:
  name: studio-secrets
  namespace: studio
type: Opaque
stringData:
  SECRET_KEY: "replace-32-byte-random"
  DATABASE_URL: "postgresql+asyncpg://studio:pw@postgres.studio:5432/studio"
  REDIS_URL: "redis://redis.studio:6379/0"
  CELERY_BROKER_URL: "redis://redis.studio:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis.studio:6379/2"
  QDRANT_URL: "http://qdrant.studio:6333"
  S3_BUCKET: "studio-media"
  S3_ACCESS_KEY: "REPLACE"
  S3_SECRET_KEY: "REPLACE"
  CLERK_SECRET_KEY: "sk_..."
  CLERK_JWKS_URL: "https://example.clerk.accounts.dev/.well-known/jwks.json"
  CLERK_JWT_ISSUER: "https://example.clerk.accounts.dev"
  STRIPE_SECRET_KEY: "sk_live_..."
  STRIPE_WEBHOOK_SECRET: "whsec_..."
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: "sk-ant-..."
  GEMINI_API_KEY: "..."
  VOYAGE_API_KEY: "..."
  ELEVENLABS_API_KEY: "..."
  REPLICATE_API_TOKEN: "..."
  SERPAPI_KEY: "..."
  SENTRY_DSN: "https://...@sentry.io/..."
