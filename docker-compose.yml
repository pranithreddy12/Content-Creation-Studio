version: "3.9"

x-backend-env: &backend-env
  env_file: .env

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5435:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6381:6379"]
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 1; done;
      mc mb -p local/${S3_BUCKET} || true;
      mc anonymous set download local/${S3_BUCKET} || true;
      "

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    <<: *backend-env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      qdrant:   { condition: service_started }
      minio:    { condition: service_started }
    volumes: [ "./backend:/app" ]

  worker:
    build: { context: ./backend, dockerfile: Dockerfile }
    <<: *backend-env
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "research,writing,publishing,analytics,heavy,default", "-c", "8", "-l", "info"]
    depends_on: [redis, postgres, qdrant]
    volumes: [ "./backend:/app" ]

  worker-video:
    build: { context: ./backend, dockerfile: Dockerfile.video }
    <<: *backend-env
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "video", "-c", "2", "-l", "info"]
    depends_on: [redis, postgres, minio]
    volumes: [ "./backend:/app" ]

  beat:
    build: { context: ./backend, dockerfile: Dockerfile }
    <<: *backend-env
    command: ["celery", "-A", "app.workers.celery_app", "beat", "-l", "info", "--schedule=/tmp/celerybeat-schedule"]
    depends_on: [redis, postgres]
    volumes: [ "./backend:/app" ]

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    env_file: .env
    command: ["pnpm", "dev"]
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes:
      - "./frontend:/app"
      - "/app/node_modules"
      - "/app/.next"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports: ["3001:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./infrastructure/monitoring/loki/config.yml:/etc/loki/config.yml
      - loki_data:/loki
    ports: ["3100:3100"]

  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./infrastructure/monitoring/alertmanager/config.yml:/etc/alertmanager/alertmanager.yml
    ports: ["9093:9093"]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  grafana_data:
  loki_data:
